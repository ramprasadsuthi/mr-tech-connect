<!DOCTYPE html>
<html lang="en">
<head>
  <!-- html2canvas -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <meta charset="UTF-8">
  <title>Course Flyer | MR Technologies</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root{
      --ms-blue:#0078d4;
      --ms-light-blue:#e6f1ff;
      --ms-dark:#0f172a;
      --ms-gray:#f3f3f3;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family:'Segoe UI',SegoeUI,Roboto,Arial,sans-serif;
      background:var(--ms-gray);
      color:var(--ms-dark);
    }
    .flyer{
      max-width:920px;
      margin:40px auto;
      background:#fff;
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 12px 28px rgba(0,0,0,.12);
    }
    .logo{
      position:absolute;
      top:24px;
      right:32px;
      height:48px;          /* adjust if needed */
      border-radius:8px;
      object-fit:contain;
    }
    .hero{
      background:linear-gradient(135deg,var(--ms-blue) 0%,#005fa3 100%);
      color:#fff;
      padding:56px 40px 64px;
      position:relative;
    }
    .hero h1{
      font-size:48px;
      margin:0 0 12px;
      line-height:1.1;
    }
    .hero p{
      font-size:18px;
      max-width:620px;
    }
    .badges{
      display:flex;
      flex-wrap:wrap;
      gap:16px;
      margin-top:24px;
    }
    .badge{
      background:rgba(255,255,255,.15);
      border-radius:8px;
      padding:8px 14px;
      font-size:15px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .badge span{font-weight:600;}

    .section{padding:40px;}
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:24px;
      margin-top:16px;
    }

    /* TRACK CARDS */
    .track-card{
      background:var(--ms-light-blue);
      border-radius:14px;
      padding:26px 22px;
      border:2px solid #d0e5ff;
      position:relative;
      cursor:pointer;
      transition:all .25s ease;
    }
    .track-card:hover{
      transform:translateY(-4px);
    }
    .track-card.selected{
      border-color:var(--ms-blue);
      box-shadow:0 0 0 4px rgba(0,120,212,.15);
      background:#f0f8ff;
    }
    .track-badge{
      position:absolute;
      top:-12px;
      right:16px;
      background:var(--ms-blue);
      color:#fff;
      padding:6px 14px;
      border-radius:999px;
      font-size:13px;
      font-weight:600;
    }
    .track-card.selected .track-badge{
      background:#16a34a;
    }
    .track-card h3{
      margin:0;
      font-size:22px;
      color:var(--ms-blue);
    }
    .track-card p{
      margin:6px 0 14px;
      font-size:15px;
      font-weight:500;
      color:#334155;
    }
    .track-card ul{
      padding-left:18px;
      margin:0;
    }
    .track-card li{
      margin-bottom:6px;
    }

    .highlights{
      margin:32px 0;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:14px;
    }
    .highlight-item{
      display:flex;
      gap:10px;
      align-items:flex-start;
    }
    .highlight-item::before{
      content:"✔";
      color:#16a34a;
      font-weight:700;
      margin-top:2px;
    }

    .cta{
      background:var(--ms-blue);
      color:#fff;
      text-align:center;
      padding:36px 24px;
    }
    .cta a{
      display:inline-block;
      background:#fff;
      color:var(--ms-blue);
      padding:14px 26px;
      border-radius:8px;
      font-size:18px;
      font-weight:600;
      text-decoration:none;
      margin-top:18px;
    }
    .contact{
      margin-top:24px;
      line-height:1.8;
      font-size:16px;
    }
    .contact a{
      color:#fff;
      text-decoration:underline;
      background:transparent;
    }
    .contact a:hover{opacity:.85;}

    @media(max-width:500px){
      .hero h1{font-size:36px;}
      .hero,.section{padding:32px 20px;}
    }

    .recommended-badge{
        position:absolute;
        top:-12px;
        left:16px;
        background:#16a34a;
        color:#fff;
        padding:6px 14px;
        border-radius:999px;
        font-size:13px;
        font-weight:600;
     }

     .recommendation-note{
        margin-top: 28px;
        padding: 18px 20px;
        background: #f0f8ff;
        border-left: 5px solid var(--ms-blue);
        border-radius: 10px;
        font-size: 16px;
        line-height: 1.6;
        color: #1e293b;
      }

      .price-box{
  margin: 16px 0;
  padding: 12px 14px;
  background: #ffffff;
  border-radius: 10px;
  border: 1px dashed #c7def6;
}

.current-price{
  font-size: 24px;
  font-weight: 700;
  color: var(--ms-blue);
}

.original-price{
  margin-left: 10px;
  font-size: 15px;
  color: #64748b;
  text-decoration: line-through;
}

.price-note{
  font-size: 13px;
  color: #475569;
  margin-top: 4px;
}

.details-link{
  display:inline-block;
  margin-top:12px;
  font-size:14px;
  font-weight:600;
  color:var(--ms-blue);
  text-decoration:underline;
}

.details-link:hover{
  opacity:0.85;
}
  </style>
</head>

<body>

<div class="flyer" id="flyer">

  <!-- HERO -->
  <section class="hero">
    <h1 id="courseTitle"></h1>
    <p id="courseDescription"></p>
    <div class="badges" id="badges"></div>
  </section>

  <!-- TRACKS -->
  <section class="section">
    <h2>⏱️ Program Tracks</h2>
    <div class="grid" id="tracks"></div>

    <div class="highlights" id="highlights"></div>
    <div class="recommendation-note">
        💡 <strong>Note:</strong>
        We recommend the <strong>20-day track</strong> for strong fundamentals,
        but the choice is yours.
    </div>
  </section>

  <!-- CTA -->
  <section class="cta">
    <h2 id="ctaTitle">Select a program track to continue</h2>
    <a id="ctaLink" href="#" target="_blank">Enroll Now</a>
    <div class="contact" id="contact"></div>
  </section>

</div>

<div style="text-align:center;margin-top:30px;">
  <button onclick="downloadAsImage()">📸 Download JPG</button>
  <button onclick="downloadAsPDF()">📄 Download PDF</button>
</div>

<script>
/* ======================
   COURSE DATA
   ====================== */

const courseData = {
  title: "College Workshops & CRT Programs – Industry Readiness Initiative",

  description: "Industry-focused workshops and campus recruitment training programs on AI, Full Stack, Data Analytics, Cybersecurity, and more.",

  badges: [
    "🎓 Campus to Corporate Readiness",
    "🤖 AI, Data & Full Stack Exposure",
    "💼 Placement-Focused Training"
  ],

  tracks: [
    {
      duration: "15 Days – Intensive Workshop",
      subtitle: "Best for quick skill enhancement & awareness",
      recommended: false,
      price: 5000,
      originalPrice: 10000,
      detailsLink: "tracks/workshop-15-days.html",
      modules: [
        "Introduction to AI & Emerging Technologies",
        "Full Stack Development Basics",
        "Data Analytics Fundamentals",
        "Cybersecurity Awareness",
        "Mini Hands-on Activities",
        "Career Guidance & Roadmap Session"
      ]
    },
    {
      duration: "20 Days – Intensive Workshop + CRT",
      subtitle: "Best for placement preparation & practical exposure",
      recommended: true,
      price: 10000,
      originalPrice: 15000,
      detailsLink: "tracks/crt-20-days.html",
      modules: [
        "Aptitude & Logical Reasoning",
        "Technical Training (AI / Full Stack / Data Analytics)",
        "Resume Building & LinkedIn Optimization",
        "Mock Interviews (HR + Technical)",
        "Real-time Mini Project",
        "Communication & Soft Skills Training",
        "Placement Preparation Strategy"
      ]
    }
  ],

  highlights: [
    "Industry-aligned curriculum designed for college students",
    "Hands-on sessions with real-time use cases",
    "CRT (Campus Recruitment Training) included",
    "Expert trainers from industry background",
    "Resume building & interview preparation",
    "Boost placement opportunities significantly"
  ],

  enrollLink: "https://tinyurl.com/mrcontact",

  contact: `
    📞 <strong>+91-99639 29944</strong><br>
    🌐 <a href="https://www.mrtechinfo.com" target="_blank">mrtechinfo.com</a><br>
    📍 MR Technologies, Dabagardens, Visakhapatnam-530020<br>
    📅 Workshops available for colleges across AP & Telangana
  `
};

/* ======================
   RENDER LOGIC
   ====================== */

document.getElementById("courseTitle").innerText = courseData.title;
document.getElementById("courseDescription").innerText = courseData.description;
document.getElementById("contact").innerHTML = courseData.contact;

// badges
const badgeBox = document.getElementById("badges");
courseData.badges.forEach(b=>{
  const div=document.createElement("div");
  div.className="badge";
  div.innerHTML=`<span>${b}</span>`;
  badgeBox.appendChild(div);
});

// tracks + selection
const trackBox = document.getElementById("tracks");
let defaultSelectedTrack = null;

courseData.tracks.forEach(t => {
  const div = document.createElement("div");
  div.className = "track-card";

  div.innerHTML = `
  ${t.recommended ? `<div class="recommended-badge">Recommended</div>` : ``}
  <div class="track-badge">${t.duration}</div>

  <h3>${t.duration}</h3>
  <p>${t.subtitle}</p>

  <div class="price-box">
    <span class="current-price">₹${t.price.toLocaleString()}</span>
    <span class="original-price">₹${t.originalPrice.toLocaleString()}</span>
    <div class="price-note">Limited-time offer</div>
  </div>

  <ul>${t.modules.map(m => `<li>${m}</li>`).join("")}</ul>

  <a 
    class="details-link" 
    href="${t.detailsLink}" 
    target="_blank"
    onclick="event.stopPropagation()"
  >
    View detailed syllabus →
  </a>
`;

  div.addEventListener("click", () => selectTrack(div, t));
  trackBox.appendChild(div);

  if (t.recommended) {
    defaultSelectedTrack = { div, track: t };
  }
});

// auto-select recommended
if (defaultSelectedTrack) {
  selectTrack(defaultSelectedTrack.div, defaultSelectedTrack.track);
}

function selectTrack(card, track) {
  document.querySelectorAll(".track-card")
    .forEach(c => c.classList.remove("selected"));

  card.classList.add("selected");

  document.getElementById("ctaTitle").innerText =
    `${track.duration} selected – ₹${track.price.toLocaleString()}`;

  document.getElementById("ctaLink").href =
    `${courseData.enrollLink}?track=${encodeURIComponent(track.duration)}&price=${track.price}`;
}


// highlights
const highlightBox=document.getElementById("highlights");
courseData.highlights.forEach(h=>{
  const div=document.createElement("div");
  div.className="highlight-item";
  div.innerText=h;
  highlightBox.appendChild(div);
});

// export
function downloadAsImage(){
  html2canvas(document.getElementById("flyer")).then(canvas=>{
    const link=document.createElement("a");
    link.download="Course_Flyer.jpg";
    link.href=canvas.toDataURL("image/jpeg");
    link.click();
  });
}
async function downloadAsPDF(){
  const {jsPDF}=window.jspdf;
  const canvas=await html2canvas(document.getElementById("flyer"),{scale:2});
  const pdf=new jsPDF("p","mm","a4");
  const w=pdf.internal.pageSize.getWidth();
  const h=(canvas.height*w)/canvas.width;
  pdf.addImage(canvas.toDataURL("image/png"),"PNG",0,0,w,h);
  pdf.save("Course_Flyer.pdf");
}
</script>

</body>
</html>
